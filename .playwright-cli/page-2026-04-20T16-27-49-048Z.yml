            - img [ref=e270]
          - generic [ref=e272] [cursor=pointer]: Your data stays local
        - generic [ref=e273]: "Sherlock stores all workspace data — artifacts, chat history, research boards, signals, and run records — in a browser-local SQLite database backed by IndexedDB. This means:"
        - list [ref=e274]:
          - listitem [ref=e275]: No account or login required
          - listitem [ref=e276]: No data leaves your browser unless you explicitly export it
          - listitem [ref=e277]: Clearing your browser storage removes your local data, so export backups when it matters
        - generic [ref=e278]:
          - text: You can export individual artifacts as HTML, Markdown, or JSON, and export full workspace backups from
          - strong [ref=e279]: Settings → Data
          - text: to move your research between devices or share it with others.
