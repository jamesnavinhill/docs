        - generic [ref=e249]: "Sherlock does not provide AI access on your behalf. To run investigations or use the chat feature, you need at least one API key from a supported provider:"
        - list [ref=e250]:
          - listitem [ref=e251]:
            - strong [ref=e252]: Google Gemini
            - text: — available from Google AI Studio
          - listitem [ref=e253]:
            - strong [ref=e254]: OpenRouter
            - text: — a single key that routes to hundreds of models, including free tiers
          - listitem [ref=e255]:
            - strong [ref=e256]: OpenAI
            - text: — GPT-4 and other OpenAI models
          - listitem [ref=e257]:
            - strong [ref=e258]: Anthropic
            - text: — Claude models
        - generic [ref=e259]:
          - text: You add your key once in
          - strong [ref=e260]: Settings → Runtime
          - text: ", and it stays in your browser. Sherlock never transmits your key to its own servers. For shared or public deployments, every user adds their own key — there are no server-side credentials to manage."
        - generic [ref=e261]:
          - img "Note" [ref=e263]
          - generic [ref=e266]: You can browse existing workspaces and artifacts without an API key. A key is only required when you want to run new AI analysis or start a chat session.
        - heading "Navigate to header Your data stays local" [level=2] [ref=e267]:
          - link "Navigate to header" [ref=e268] [cursor=pointer]:
