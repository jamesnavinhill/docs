          - 'heading "Sherlock: AI-powered research and investigation tool" [level=1] [ref=e166]'
        - paragraph [ref=e168]: Sherlock is a browser-based AI workspace for investigations, research boards, chat, and monitoring — all data stays local in your browser.
      - generic [ref=e169]:
        - generic [ref=e170]: Sherlock is an AI-powered research and investigation workspace that runs entirely in your browser. You bring your own API key from a supported AI provider, point it at a topic, and Sherlock helps you run structured analysis, build visual research boards, chat with an AI grounded in your findings, track activity over time, and monitor for new signals — with every byte of your data staying in your browser, not on Sherlock’s servers.
        - heading "Navigate to header How Sherlock works" [level=2] [ref=e171]:
          - link "Navigate to header" [ref=e172] [cursor=pointer]:
            - /url: "#how-sherlock-works"
