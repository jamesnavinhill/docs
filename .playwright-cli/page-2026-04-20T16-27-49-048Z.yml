          - generic [ref=e176] [cursor=pointer]: How Sherlock works
        - generic [ref=e177]:
          - text: Sherlock organizes your research into
          - strong [ref=e178]: workspaces
          - text: . Each workspace holds the artifacts (investigation reports), chat sessions, board canvases, signals, and source records that belong to a single research project or topic. You can have as many workspaces as you need, and each one persists locally in your browser — no account or server required.
        - generic [ref=e179]: When you launch a run, Sherlock sends your prompt and workspace context directly to the AI provider you’ve configured — Gemini, OpenRouter, OpenAI, or Anthropic. The response comes back as a structured artifact that you can read, annotate, cite, and build on. Nothing passes through Sherlock’s own servers.
