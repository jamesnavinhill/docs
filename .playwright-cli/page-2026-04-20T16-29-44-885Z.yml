        - generic [ref=e122] [cursor=pointer]: Bring your own key (BYOK)
      - generic [ref=e123]: "Sherlock does not provide AI access on your behalf. To run investigations or use the chat feature, you need at least one API key from a supported provider:"
      - list [ref=e124]:
        - listitem [ref=e125]:
          - strong [ref=e126]: Google Gemini
          - text: — available from Google AI Studio
        - listitem [ref=e127]:
          - strong [ref=e128]: OpenRouter
          - text: — a single key that routes to hundreds of models, including free tiers
        - listitem [ref=e129]:
          - strong [ref=e130]: OpenAI
          - text: — GPT-4 and other OpenAI models
        - listitem [ref=e131]:
          - strong [ref=e132]: Anthropic
          - text: — Claude models
      - generic [ref=e133]:
        - text: You add your key once in
        - strong [ref=e134]: Settings → Runtime
        - text: ", and it stays in your browser. Sherlock never transmits your key to its own servers. For shared or public deployments, every user adds their own key — there are no server-side credentials to manage."
      - generic [ref=e135]:
        - img "Note" [ref=e137]
        - generic [ref=e140]: You can browse existing workspaces and artifacts without an API key. A key is only required when you want to run new AI analysis or start a chat session.
      - heading "Navigate to header Your data stays local" [level=2] [ref=e141]:
        - link "Navigate to header" [ref=e142] [cursor=pointer]:
          - /url: "#your-data-stays-local"
          - img [ref=e144]
        - generic [ref=e146] [cursor=pointer]: Your data stays local
      - generic [ref=e147]: "Sherlock stores all workspace data — artifacts, chat history, research boards, signals, and run records — in a browser-local SQLite database backed by IndexedDB. This means:"
      - list [ref=e148]:
        - listitem [ref=e149]: No account or login required
        - listitem [ref=e150]: No data leaves your browser unless you explicitly export it
        - listitem [ref=e151]: Clearing your browser storage removes your local data, so export backups when it matters
      - generic [ref=e152]:
        - text: You can export individual artifacts as HTML, Markdown, or JSON, and export full workspace backups from
        - strong [ref=e153]: Settings → Data
        - text: to move your research between devices or share it with others.
