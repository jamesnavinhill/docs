        - 'heading "Sherlock: AI-powered research and investigation tool" [level=1] [ref=e40]'
      - paragraph [ref=e42]: Sherlock is a browser-based AI workspace for investigations, research boards, chat, and monitoring — all data stays local in your browser.
    - generic [ref=e43]:
      - generic [ref=e44]: Sherlock is an AI-powered research and investigation workspace that runs entirely in your browser. You bring your own API key from a supported AI provider, point it at a topic, and Sherlock helps you run structured analysis, build visual research boards, chat with an AI grounded in your findings, track activity over time, and monitor for new signals — with every byte of your data staying in your browser, not on Sherlock’s servers.
      - heading "Navigate to header How Sherlock works" [level=2] [ref=e45]:
        - link "Navigate to header" [ref=e46] [cursor=pointer]:
          - /url: "#how-sherlock-works"
          - img [ref=e48]
        - generic [ref=e50] [cursor=pointer]: How Sherlock works
      - generic [ref=e51]:
        - text: Sherlock organizes your research into
        - strong [ref=e52]: workspaces
        - text: . Each workspace holds the artifacts (investigation reports), chat sessions, board canvases, signals, and source records that belong to a single research project or topic. You can have as many workspaces as you need, and each one persists locally in your browser — no account or server required.
      - generic [ref=e53]: When you launch a run, Sherlock sends your prompt and workspace context directly to the AI provider you’ve configured — Gemini, OpenRouter, OpenAI, or Anthropic. The response comes back as a structured artifact that you can read, annotate, cite, and build on. Nothing passes through Sherlock’s own servers.
