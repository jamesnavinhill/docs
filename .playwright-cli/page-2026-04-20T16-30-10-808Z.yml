        - heading [level=2] [ref=e309]:
          - link [ref=e310] [cursor=pointer]:
            - /url: "#bring-your-own-key-byok"
            - img [ref=e264]
          - generic [ref=e266] [cursor=pointer]: Bring your own key (BYOK)
        - generic [ref=e267]: "Sherlock does not provide AI access on your behalf. To run investigations or use the chat feature, you need at least one API key from a supported provider:"
        - list [ref=e268]:
          - listitem [ref=e269]:
            - strong [ref=e270]: Google Gemini
            - text: — available from Google AI Studio
          - listitem [ref=e271]:
            - strong [ref=e272]: OpenRouter
            - text: — a single key that routes to hundreds of models, including free tiers
          - listitem [ref=e273]:
            - strong [ref=e274]: OpenAI
            - text: — GPT-4 and other OpenAI models
          - listitem [ref=e275]:
            - strong [ref=e276]: Anthropic
            - text: — Claude models
        - generic [ref=e277]:
          - text: You add your key once in
          - strong [ref=e278]: Settings → Runtime
          - text: ", and it stays in your browser. Sherlock never transmits your key to its own servers. For shared or public deployments, every user adds their own key — there are no server-side credentials to manage."
        - generic [ref=e279]:
          - img [ref=e311]
          - generic [ref=e284]: You can browse existing workspaces and artifacts without an API key. A key is only required when you want to run new AI analysis or start a chat session.
        - heading [level=2] [ref=e312]:
          - link [ref=e313] [cursor=pointer]:
            - /url: "#your-data-stays-local"
            - img [ref=e288]
          - generic [ref=e290] [cursor=pointer]: Your data stays local
        - generic [ref=e291]: "Sherlock stores all workspace data — artifacts, chat history, research boards, signals, and run records — in a browser-local SQLite database backed by IndexedDB. This means:"
        - list [ref=e292]:
          - listitem [ref=e293]: No account or login required
          - listitem [ref=e294]: No data leaves your browser unless you explicitly export it
          - listitem [ref=e295]: Clearing your browser storage removes your local data, so export backups when it matters
        - generic [ref=e296]:
          - text: You can export individual artifacts as HTML, Markdown, or JSON, and export full workspace backups from
          - strong [ref=e297]: Settings → Data
          - text: to move your research between devices or share it with others.
