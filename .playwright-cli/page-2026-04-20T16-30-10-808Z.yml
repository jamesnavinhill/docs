        - paragraph [ref=e180]: Sherlock is a browser-based AI workspace for investigations, research boards, chat, and monitoring — all data stays local in your browser.
      - generic [ref=e43]:
        - generic [ref=e181]: Sherlock is an AI-powered research and investigation workspace that runs entirely in your browser. You bring your own API key from a supported AI provider, point it at a topic, and Sherlock helps you run structured analysis, build visual research boards, chat with an AI grounded in your findings, track activity over time, and monitor for new signals — with every byte of your data staying in your browser, not on Sherlock’s servers.
        - heading [level=2] [ref=e305]:
          - link [ref=e306] [cursor=pointer]:
            - /url: "#how-sherlock-works"
            - img [ref=e185]
          - generic [ref=e187] [cursor=pointer]: How Sherlock works
        - generic [ref=e188]:
          - text: Sherlock organizes your research into
          - strong [ref=e189]: workspaces
          - text: . Each workspace holds the artifacts (investigation reports), chat sessions, board canvases, signals, and source records that belong to a single research project or topic. You can have as many workspaces as you need, and each one persists locally in your browser — no account or server required.
        - generic [ref=e190]: When you launch a run, Sherlock sends your prompt and workspace context directly to the AI provider you’ve configured — Gemini, OpenRouter, OpenAI, or Anthropic. The response comes back as a structured artifact that you can read, annotate, cite, and build on. Nothing passes through Sherlock’s own servers.
        - heading [level=2] [ref=e307]:
          - link [ref=e308] [cursor=pointer]:
            - /url: "#key-capabilities"
            - img [ref=e194]
          - generic [ref=e196] [cursor=pointer]: Key capabilities
